<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Server Dashboard</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="theme.js"></script>
    <link rel="stylesheet" href="/assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/pages/login.css">
    <link rel="stylesheet" href="/styles/pages/reset-password.css">
    <link rel="stylesheet" href="/styles/nav.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="login-title" id="page-title">Reset Password</h1>
            <p class="login-subtitle" id="page-subtitle">Enter your email to receive a reset link</p>

            <!-- Error Messages -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Success Message -->
            <div class="error-message" id="successMessage" style="background: rgba(46, 213, 115, 0.1); border-color: #2ed573;">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <!-- Forgot Password Form (Step 1: Request reset) -->
            <form id="forgotForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email address"
                        required
                        autocomplete="email"
                    >
                </div>

                <button type="submit" class="login-btn" id="sendResetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="login.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </form>

            <!-- Reset Password Form (Step 2: Set new password) -->
            <form id="resetForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input 
                        type="password" 
                        id="new-password" 
                        placeholder="Enter new password"
                        required
                        autocomplete="new-password"
                        minlength="8"
                    >
                    <div id="password-requirements" style="margin-top: 8px; font-size: 0.8rem; color: #999; line-height: 1.6;">
                        <div id="req-length" style="color: #999;"><i class="fas fa-circle"></i> At least 8 characters</div>
                        <div id="req-uppercase" style="color: #999;"><i class="fas fa-circle"></i> One uppercase letter</div>
                        <div id="req-lowercase" style="color: #999;"><i class="fas fa-circle"></i> One lowercase letter</div>
                        <div id="req-number" style="color: #999;"><i class="fas fa-circle"></i> One number</div>
                        <div id="req-special" style="color: #999;"><i class="fas fa-circle"></i> One special character</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        placeholder="Confirm new password"
                        required
                        autocomplete="new-password"
                        minlength="8"
                    >
                    <div id="password-match" style="margin-top: 5px; font-size: 0.8rem; display: none;"></div>
                </div>

                <button type="submit" class="login-btn" id="resetPwdBtn">
                    <i class="fas fa-check"></i> Reset Password
                </button>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="login.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </form>

            <!-- Loading State -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span id="loadingText">Processing...</span>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const forgotForm = document.getElementById('forgotForm');
            const resetForm = document.getElementById('resetForm');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMessage = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            const pageTitle = document.getElementById('page-title');
            const pageSubtitle = document.getElementById('page-subtitle');

            // Check URL parameters for reset token
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('token');
            const resetEmail = urlParams.get('email');

            if (resetToken && resetEmail) {
                // Show reset password form
                forgotForm.style.display = 'none';
                resetForm.style.display = 'block';
                pageTitle.textContent = 'Set New Password';
                pageSubtitle.textContent = 'Enter your new password for ' + resetEmail;
                
                // Pre-fill email in a hidden field or just use the URL param
                const emailInput = document.createElement('input');
                emailInput.type = 'hidden';
                emailInput.id = 'reset-email';
                emailInput.value = resetEmail;
                resetForm.appendChild(emailInput);
                
                const tokenInput = document.createElement('input');
                tokenInput.type = 'hidden';
                tokenInput.id = 'reset-token';
                tokenInput.value = resetToken;
                resetForm.appendChild(tokenInput);

                // Live password validation
                const newPasswordInput = document.getElementById('new-password');
                const confirmPasswordInput = document.getElementById('confirm-password');
                const passwordMatch = document.getElementById('password-match');

                newPasswordInput.addEventListener('input', function() {
                    validatePasswordStrength(this.value);
                    checkPasswordMatch();
                });

                confirmPasswordInput.addEventListener('input', function() {
                    checkPasswordMatch();
                });

                function validatePasswordStrength(password) {
                    const reqLength = document.getElementById('req-length');
                    const reqUppercase = document.getElementById('req-uppercase');
                    const reqLowercase = document.getElementById('req-lowercase');
                    const reqNumber = document.getElementById('req-number');
                    const reqSpecial = document.getElementById('req-special');

                    updateRequirement(reqLength, password.length >= 8);
                    updateRequirement(reqUppercase, /[A-Z]/.test(password));
                    updateRequirement(reqLowercase, /[a-z]/.test(password));
                    updateRequirement(reqNumber, /[0-9]/.test(password));
                    updateRequirement(reqSpecial, /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password));
                }

                function updateRequirement(element, isValid) {
                    if (isValid) {
                        element.style.color = '#2ed573';
                        element.querySelector('i').className = 'fas fa-check-circle';
                    } else {
                        element.style.color = '#999';
                        element.querySelector('i').className = 'fas fa-circle';
                    }
                }

                function checkPasswordMatch() {
                    const pwd = newPasswordInput.value;
                    const confirm = confirmPasswordInput.value;
                    if (confirm.length === 0) {
                        passwordMatch.style.display = 'none';
                        return;
                    }
                    passwordMatch.style.display = 'block';
                    if (pwd === confirm) {
                        passwordMatch.style.color = '#2ed573';
                        passwordMatch.innerHTML = '<i class="fas fa-check"></i> Passwords match';
                    } else {
                        passwordMatch.style.color = '#ff6b6b';
                        passwordMatch.innerHTML = '<i class="fas fa-times"></i> Passwords do not match';
                    }
                }

                // Handle reset password submission
                resetForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const newPassword = newPasswordInput.value;
                    const confirmPassword = confirmPasswordInput.value;

                    // Hide previous messages
                    hideMessages();

                    // Validation
                    if (!newPassword || !confirmPassword) {
                        showError('Please fill in all fields');
                        return;
                    }

                    if (newPassword !== confirmPassword) {
                        showError('Passwords do not match');
                        return;
                    }

                    if (newPassword.length < 8) {
                        showError('Password must be at least 8 characters');
                        return;
                    }

                    // Show loading
                    loadingText.textContent = 'Resetting password...';
                    loading.classList.add('show');
                    document.getElementById('resetPwdBtn').disabled = true;

                    // Call API
                    window.Api.request('/auth/reset-password', {
                        method: 'POST',
                        body: { token: resetToken, email: resetEmail, password: newPassword }
                    })
                    .then(function(response) {
                        loading.classList.remove('show');
                        document.getElementById('resetPwdBtn').disabled = false;
                        
                        if (response && response.error) {
                            showError(response.error);
                            if (response.issues) {
                                showError(response.issues.join('. '));
                            }
                        } else {
                            // Show success
                            showSuccess('Password has been reset successfully! Redirecting to login...');
                            setTimeout(function() {
                                window.location.href = 'login.html';
                            }, 3000);
                        }
                    })
                    .catch(function(err) {
                        loading.classList.remove('show');
                        document.getElementById('resetPwdBtn').disabled = false;
                        showError(err.message || 'An error occurred. Please try again.');
                    });
                });
            } else {
                // Show forgot password form (default)
                forgotForm.style.display = 'block';
                resetForm.style.display = 'none';
                pageTitle.textContent = 'Forgot Password';
                pageSubtitle.textContent = 'Enter your email to receive a reset link';

                // Handle forgot password submission
                forgotForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value.trim();

                    // Hide previous messages
                    hideMessages();

                    if (!email) {
                        showError('Please enter your email address');
                        return;
                    }

                    // Basic email validation
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(email)) {
                        showError('Please enter a valid email address');
                        return;
                    }

                    // Show loading
                    loadingText.textContent = 'Sending reset link...';
                    loading.classList.add('show');
                    document.getElementById('sendResetBtn').disabled = true;

                    // Call API
                    window.Api.request('/auth/forgot-password', {
                        method: 'POST',
                        body: { email: email }
                    })
                    .then(function(response) {
                        loading.classList.remove('show');
                        document.getElementById('sendResetBtn').disabled = false;
                        
                        if (response && response.error) {
                            showError(response.error);
                        } else {
                            // Show success message
                            showSuccess(response.message || 'If that email is registered, a reset link has been sent.');
                            
                            // If a reset link is returned (dev mode), show it
                            if (response.resetLink) {
                                var linkDiv = document.createElement('div');
                                linkDiv.style.cssText = 'margin-top: 15px; padding: 12px; background: rgba(0, 224, 255, 0.1); border-radius: 8px; border-left: 4px solid var(--neon-blue); font-size: 0.85rem; word-break: break-all;';
                                linkDiv.innerHTML = '<strong>Dev Mode:</strong> <a href="' + response.resetLink + '" style="color: var(--primary);">Click here to reset password</a>';
                                document.querySelector('.login-card').appendChild(linkDiv);
                            }
                        }
                    })
                    .catch(function(err) {
                        loading.classList.remove('show');
                        document.getElementById('sendResetBtn').disabled = false;
                        showError(err.message || 'An error occurred. Please try again.');
                    });
                });
            }

            function showError(msg) {
                errorText.textContent = msg;
                errorMessage.classList.add('show');
                successMessage.classList.remove('show');
            }

            function showSuccess(msg) {
                successText.textContent = msg;
                successMessage.classList.add('show');
                errorMessage.classList.remove('show');
            }

            function hideMessages() {
                errorMessage.classList.remove('show');
                successMessage.classList.remove('show');
            }
        });
    </script>
</body>
</html>
