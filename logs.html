<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs | Server Dashboard</title>
    <link rel="stylesheet" href="/assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="/styles/base.css">
    <script src="theme.js"></script>
    <link rel="stylesheet" href="/styles/pages/logs.css">
<link rel="stylesheet" href="/styles/nav.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>System Logs</h1>
            <p class="subtitle">View and manage system event logs</p>
        </header>
        <div class="logs-container">
            <div class="logs-list">
                <div id="logs-display"></div>
                    <div class="logs-controls">
                        <div class="logs-count">
                            Showing <span id="showing-count">0</span> of <span id="total-count">0</span> logs
                        </div>
                        <div class="pagination">
                            <button id="prev-btn" title="Previous Page"><i class="fas fa-chevron-left"></i></button>
                            <span id="page-info"></span>
                            <button id="next-btn" title="Next Page"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
            </div>

            <div class="logs-sidebar">
                <div class="logs-filters">
                    <h3><i class="fas fa-filter"></i> Filters</h3>

                    <div class="filter-group">
                        <label for="level-filter">Log Level</label>
                        <select id="level-filter">
                            <option value="">All Levels</option>
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="error">Error</option>
                            <option value="success">Success</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="category-filter">Category</label>
                        <select id="category-filter">
                            <option value="">All Categories</option>
                            <option value="system">System</option>
                            <option value="user">User</option>
                            <option value="security">Security</option>
                            <option value="alerts">Alerts</option>
                            <option value="services">Services</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="search-filter">Search</label>
                        <input type="text" id="search-filter" placeholder="Search logs...">
                    </div>
                </div>

                <div class="log-stats">
                    <h3>Statistics</h3>
                    <div class="stat-item">
                        <span>Total Logs</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                    <div class="stat-item">
                        <span><i class="fas fa-circle stat-icon"></i>Info</span>
                        <span class="stat-value" id="stat-info">0</span>
                    </div>
                    <div class="stat-item">
                        <span><i class="fas fa-circle stat-icon warning"></i>Warning</span>
                        <span class="stat-value" id="stat-warning">0</span>
                    </div>
                    <div class="stat-item">
                        <span><i class="fas fa-circle stat-icon error"></i>Error</span>
                        <span class="stat-value" id="stat-error">0</span>
                    </div>
                    <div class="stat-item">
                        <span><i class="fas fa-circle stat-icon success"></i>Success</span>
                        <span class="stat-value" id="stat-success">0</span>
                    </div>
                </div>

                <button class="clear-logs-btn" id="clear-logs-btn">
                    <i class="fas fa-trash-alt"></i> Clear All Logs
                </button>

                <div class="download-section">
                    <label>Download Logs</label>
                    <button class="download-btn" id="download-csv-btn">
                        <i class="fas fa-download"></i> CSV
                    </button>
                    <button class="download-btn" id="download-json-btn">
                        <i class="fas fa-download"></i> JSON
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
    <script src="base.js"></script>
    <script>
        // Logs page configuration
        let currentPage = 1;
        let logsPerPage = 10;
        let totalLogs = 0;
        let totalPages = 1;
        let currentLogs = [];
        let activeFilters = {};

        /**
         * Get auth headers from window.Api
         */
        function getAuthHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            if (window.Api && window.Api.token) {
                headers['Authorization'] = 'Bearer ' + window.Api.token;
            }
            return headers;
        }

        /**
         * Map server-side action to display level
         */
        function actionToLevel(action) {
            const errorActions = ['login_failed', '2fa_failed', 'error'];
            const warningActions = ['login_locked', 'password_changed', 'delete_user'];
            const successActions = ['login', 'register', 'create_user', 'sso_login', 'sso_signup', '2fa_enabled', '2fa_disabled', 'reset_user_2fa'];
            if (errorActions.includes(action)) return 'error';
            if (warningActions.includes(action)) return 'warning';
            if (successActions.includes(action)) return 'success';
            return 'info';
        }

        /**
         * Map server-side action to display category
         */
        function actionToCategory(action) {
            const authActions = ['login', 'login_failed', 'login_locked', 'logout', 'register', 'sso_login', 'sso_signup', 'session_refresh'];
            const userActions = ['create_user', 'update_user', 'delete_user', 'reset_user_2fa', '2fa_enabled', '2fa_disabled', '2fa_failed'];
            const securityActions = ['password_changed', '2fa_enabled', '2fa_disabled', 'login_failed', 'login_locked', 'account_lockout'];
            if (authActions.includes(action)) return 'Authentication';
            if (userActions.includes(action)) return 'User Management';
            if (securityActions.includes(action)) return 'Security';
            return 'System';
        }

        /**
         * Fetch logs from server API
         */
        async function fetchLogs() {
            try {
                const params = new URLSearchParams();
                params.set('page', currentPage);
                params.set('limit', logsPerPage);
                if (activeFilters.level) params.set('action', activeFilters.level);
                if (activeFilters.category) params.set('search', activeFilters.category);
                if (activeFilters.search) params.set('search', activeFilters.search);

                const response = await fetch('/api/logs?' + params.toString(), {
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        showError('You do not have permission to view logs.');
                        return;
                    }
                    throw new Error('Failed to fetch logs');
                }

                const data = await response.json();
                currentLogs = data.logs || [];
                totalLogs = data.pagination?.total || currentLogs.length;
                totalPages = data.pagination?.totalPages || 1;
                renderLogs();
                updatePaginationControls();
            } catch (err) {
                console.error('Error fetching logs:', err);
                showError('Failed to load logs from server.');
            }
        }

        /**
         * Fetch statistics from server API
         */
        async function fetchStats() {
            try {
                const response = await fetch('/api/logs/stats', {
                    headers: getAuthHeaders()
                });

                if (!response.ok) return;

                const stats = await response.json();
                document.getElementById('stat-total').textContent = stats.total || 0;
                document.getElementById('stat-info').textContent = stats.byAction?.login || 0;
                document.getElementById('stat-warning').textContent = stats.byAction?.login_failed || 0;
                document.getElementById('stat-error').textContent = stats.byAction?.error || 0;
                document.getElementById('stat-success').textContent = stats.last24h || 0;
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }

        /**
         * Initialize the logs page
         */
        function initializeLogsPage() {
            fetchLogs();
            fetchStats();
            
            // Attach event listeners
            document.getElementById('prev-btn').addEventListener('click', () => {
                if (currentPage > 1) { currentPage--; fetchLogs(); }
            });
            document.getElementById('next-btn').addEventListener('click', () => {
                if (currentPage < totalPages) { currentPage++; fetchLogs(); }
            });
            document.getElementById('level-filter').addEventListener('change', applyFilters);
            document.getElementById('category-filter').addEventListener('change', applyFilters);
            document.getElementById('search-filter').addEventListener('keyup', applyFilters);
            document.getElementById('clear-logs-btn').addEventListener('click', clearAllLogs);
            document.getElementById('download-csv-btn').addEventListener('click', () => downloadExport('csv'));
            document.getElementById('download-json-btn').addEventListener('click', () => downloadExport('json'));
        }

        /**
         * Render logs into the table
         */
        function renderLogs() {
            const logsDisplay = document.getElementById('logs-display');
            
            if (currentLogs.length === 0) {
                logsDisplay.innerHTML = `
                    <div class="empty-state">
                        <div class="no-logs">
                            <i class="fas fa-inbox"></i>
                            <p>No logs to display</p>
                        </div>
                    </div>
                `;
                return;
            }

            logsDisplay.innerHTML = `
                <div class="logs-table-wrapper">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Level</th>
                                <th>Time</th>
                                <th>Message</th>
                                <th>Category</th>
                                <th>User</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${currentLogs.map(log => createLogElement(log)).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            // Update count
            const showing = Math.min(currentPage * logsPerPage, totalLogs);
            document.getElementById('showing-count').textContent = showing;
            document.getElementById('total-count').textContent = totalLogs;
        }

        /**
         * Create a log table row
         */
        function createLogElement(log) {
            const level = actionToLevel(log.action);
            const category = actionToCategory(log.action);
            const date = new Date(log.created_at || log.timestamp);
            const timeStr = date.toLocaleString();
            const username = log.username || log.user_name || log.user || 'System';

            return `
                <tr class="log-item ${level}">
                    <td>
                        <span class="log-level-badge ${level}">${level.toUpperCase()}</span>
                    </td>
                    <td>${timeStr}</td>
                    <td class="log-message">${escapeHtml(log.details || log.action)}</td>
                    <td><span class="log-category">${escapeHtml(category)}</span></td>
                    <td class="log-user">${escapeHtml(username)}</td>
                </tr>
            `;
        }

        /**
         * Apply filters and re-fetch
         */
        function applyFilters() {
            activeFilters.level = document.getElementById('level-filter').value;
            activeFilters.category = document.getElementById('category-filter').value;
            activeFilters.search = document.getElementById('search-filter').value;
            currentPage = 1;
            fetchLogs();
        }

        /**
         * Update pagination controls
         */
        function updatePaginationControls() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const pageInfo = document.getElementById('page-info');

            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage >= totalPages || totalPages === 0;
            pageInfo.textContent = totalPages === 0 ? '0 of 0' : `${currentPage} of ${totalPages}`;
        }

        /**
         * Clear all logs with confirmation
         */
        async function clearAllLogs() {
            if (!confirm('Are you sure you want to delete all logs? This action cannot be undone.')) return;

            try {
                const response = await fetch('/api/logs', {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        alert('You do not have permission to clear logs.');
                        return;
                    }
                    throw new Error('Failed to clear logs');
                }

                currentLogs = [];
                currentPage = 1;
                totalLogs = 0;
                totalPages = 1;
                document.getElementById('level-filter').value = '';
                document.getElementById('category-filter').value = '';
                document.getElementById('search-filter').value = '';
                activeFilters = {};
                renderLogs();
                fetchStats();
            } catch (err) {
                console.error('Error clearing logs:', err);
                alert('Failed to clear logs. Please try again.');
            }
        }

        /**
         * Download logs as CSV or JSON via server
         */
        function downloadExport(format) {
            const params = new URLSearchParams();
            params.set('format', format);
            if (activeFilters.level) params.set('action', activeFilters.level);
            if (activeFilters.search) params.set('search', activeFilters.search);

            const token = window.Api && window.Api.token;
            const url = '/api/logs/export?' + params.toString() + (token ? '&token=' + encodeURIComponent(token) : '');
            window.open(url, '_blank');
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(text) {
            if (typeof text !== 'string') {
                text = String(text);
            }
            const map = {
                '&': '&',
                '<': '<',
                '>': '>',
                '"': '"',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        /**
         * Show error message in logs display
         */
        function showError(message) {
            const logsDisplay = document.getElementById('logs-display');
            logsDisplay.innerHTML = `
                <div class="empty-state">
                    <div class="no-logs">
                        <i class="fas fa-exclamation-triangle" style="color: var(--error-color, #ff6b6b);"></i>
                        <p>${escapeHtml(message)}</p>
                        <button onclick="fetchLogs()" class="btn btn-primary" style="margin-top: 15px;">Retry</button>
                    </div>
                </div>
            `;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeLogsPage);
    </script>
</body>
</html>
